spring:
  application:
    name: mok-pricing-engine

  jackson:
    serialization:
      INDENT_OUTPUT: false
    time-zone: UTC
  config:
    import: "classpath:bootstrap/pricing-defaults.yml"
  jpa:
    open-in-view: false
  cache:
    type: redis
    redis:
      time-to-live: 30s

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-login-endpoint: true

external:
  accounts:
    base-url: "https://accounts.mok.internal"  # prod

ledger:
  accounts:
    cantonment: ${LEDGER_CANT:ACC-CANT}
    exploitation: ${LEDGER_EXP:ACC-EXP}
    tax: ${LEDGER_TAX:ACC-TAX}
    taxRate: ${ACC-TAX-RATE:ACC-TAX-RATE}
    taxFixed: ${ACC-TAX-FIXED:ACC-TAX-FIXED}
    external: ${ACC-EXT:ACC-EXT}
    distributed: ${ACC-DIST:ACC-DIST}
    currency: "XAF"
    bankClearing: ${ACC-BANK-CLEAR:ACC-BANK-CLEAR}