spring:
  application:
    name: mok-pricing-engine

  jackson:
    serialization:
      INDENT_OUTPUT: false
    time-zone: UTC
  config:
    import: "classpath:bootstrap/pricing-defaults.yml"
  jpa:
    open-in-view: false
  cache:
    type: redis
    redis:
      time-to-live: 30s

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-login-endpoint: true

external:
  accounts:
    base-url: "https://accounts.mok.internal"  # prod

ledger:
  accounts:
    cantonment: ${LEDGER_CANT:ACC-CANT}
    exploitation: ${LEDGER_EXP:ACC-EXP}
    tax: ${LEDGER_TAX:ACC-TAX}
    taxRate: ${LEDGER_TAX_RATE:ACC-TAX-RATE}
    taxFixed: ${LEDGER_TAX_FIXED:ACC-TAX-FIXED}
    external: ${LEDGER_EXT:ACC-EXT}
    distributed: ${LEDGER_DIST:ACC-DIST} # Remis à plat
    distributedSuperDistributor: ${LEDGER_DIST_SUPER_DISTRIBUTOR:ACC-DIST-SUPER-DISTRIBUTOR}
    distributedDistributor: ${LEDGER_DIST_DISTRIBUTOR:ACC-DIST-DISTRIBUTOR}
    distributedAgent: ${LEDGER_DIST_AGENT:ACC-DIST-AGENT}
    currency: "XAF"
    bankClearing: ${LEDGER_BANK_CLEAR:ACC-BANK-CLEAR}