spring:
  application:
    name: mok-pricing-engine

  jackson:
    serialization:
      INDENT_OUTPUT: false
  config:
    import: "classpath:bootstrap/pricing-defaults.yml"
  jpa:
    open-in-view: false

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-login-endpoint: true

external:
  accounts:
    base-url: "https://accounts.mok.internal"  # prod
