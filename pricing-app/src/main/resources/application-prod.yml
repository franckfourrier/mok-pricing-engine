spring:
  config:
    activate:
      on-profile: prod

  datasource:
    pricing:
      url: jdbc:postgresql://localhost:5432/pricing_db
      username: gateway_prod
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

    audit:
      url: jdbc:postgresql://localhost:5432/audit_db
      username: audit_user
      password: ${AUDIT_DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

pricing:
  jpa:
    hibernate:
      ddl-auto: validate

audit:
  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: 8080
  servlet:
    context-path: /api