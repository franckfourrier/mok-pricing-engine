spring:
  config:
    activate:
      on-profile: prod
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/mok-pricing-engine/protocol/openid-connect/certs}

  datasource:
    pricing:
      url: jdbc:postgresql://localhost:5432/pricing_db
      username: ${PRICING_DB_USERNAME:postgres}
      password: ${PRICING_DB_PASSWORD:7429867}
      driver-class-name: org.postgresql.Driver

    audit:
      url: jdbc:postgresql://localhost:5432/audit_db
      username: ${AUDIT_DB_USERNAME:postgres}
      password: ${AUDIT_DB_PASSWORD:7429867}
      driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

pricing:
  jpa:
    hibernate:
      ddl-auto: update

audit:
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8080

logging:
  level:
    root: INFO
    com.kratos: INFO
    # Active le debug sur le package de sécurité personnalisé
    com.kratos.mok.pricing.app.infrastructure.security: DEBUG
    # Active le debug interne de Spring Security pour voir le cycle de vie des requêtes
    org.springframework.security: INFO
    org.springframework.security.web.FilterChainProxy: DEBUG

mok:
  currency:
    default: "XAF"

springdoc:
  swagger-ui:
    groups-order: desc
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
