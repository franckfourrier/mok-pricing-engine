spring:
  config:
    activate:
      on-profile: prod
  security:
    oauth2:
      resourceserver:
        jwt:
          # Utilise en priorité la variable injectée par le docker-compose pour le réseau interne
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://keycloak:8080/realms/mok-pricing-engine}

  datasource:
    pricing:
      url: jdbc:postgresql://pricing-db:5432/pricing_db
      username: ${PRICING_DB_USER:postgres}
      password: ${PRICING_DB_PASSWORD:7429867}
      driver-class-name: org.postgresql.Driver

    audit:
      url: jdbc:postgresql://audit-db:5432/audit_db
      username: ${AUDIT_DB_USER:postgres}
      password: ${AUDIT_DB_PASSWORD:7429867}
      driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

pricing:
  jpa:
    hibernate:
      ddl-auto: validate

audit:
  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: 8080

logging:
  level:
    root: INFO
    com.kratos: INFO
    com.kratos.mok.pricing.app.infrastructure.security: DEBUG
    org.springframework.security: INFO
    org.springframework.security.web.FilterChainProxy: DEBUG

springdoc:
  swagger-ui:
    groups-order: desc
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

mok:
  security:
    keycloak:
      realm: mok-pricing-engine
      server-url: https://auth-dev.mok.kratosfinancialsinc.com